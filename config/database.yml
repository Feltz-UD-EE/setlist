default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5
  username: <%= ENV.fetch("POSTGRES_USER", ENV["USER"]) %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  # MySQL configuration retained for reference:
  # adapter: mysql2
  # encoding: utf8
  # username: root
  # password: p@ssW0rd
  # socket: /tmp/mysql.sock

development:
  <<: *default
  database: setlist_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: setlist_test

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  # Railway free-tier deployment uses one PostgreSQL service. These Rails 8
  # roles point to the same database so installed Solid gems can boot cleanly.
  cache:
    <<: *default
    url: <%= ENV["CACHE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    url: <%= ENV["QUEUE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    url: <%= ENV["CABLE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
  # To split these later, create additional Railway Postgres services and set:
  # CACHE_DATABASE_URL, QUEUE_DATABASE_URL, and CABLE_DATABASE_URL.
