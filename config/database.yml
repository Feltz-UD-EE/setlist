default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5
  username: <%= ENV.fetch("POSTGRES_USER", ENV["USER"]) %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  # MySQL configuration retained for reference:
  # adapter: mysql2
  # encoding: utf8
  # username: root
  # password: p@ssW0rd
  # socket: /tmp/mysql.sock

development:
  <<: *default
  database: setlist_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: setlist_test

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: setlist_production
  cache:
    <<: *default
    database: setlist_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: setlist_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: setlist_production_cable
    migrations_paths: db/cable_migrate
